<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/fonts/fonts.css">
    <link rel="stylesheet" href="./styles/privacy_policy.css">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./styles/media_querries_index.css">
    <title>Privacy Policy</title>
</head>
<body onload="privacyPolicyInit()">
    <section id="overlay" class="overlay d_none">
        <div class="overlay-card">
            <header class="overlay-header">
                <a href="./index.html#landing_section"><img src="./assets/img/david.png" alt="my Name"></a>
                <button id="close_overlay" class="main-nav-burger-menu-btn">
                    <svg width="35" height="32" viewBox="0 0 35 32" fill="none">
                        <path d="M7 5.00024L27.6506 26.7615" stroke="white" stroke-width="2" stroke-linecap="round" />
                        <path d="M7 27L27.46 5.05939" stroke="white" stroke-width="2" stroke-linecap="round" />
                    </svg>
                </button>
            </header>
            <section class="overlay-menu-body">
                <nav class="overlay-nav">
                    <div class="overlay-nav-menu-links">
                        <div class="overlay-nav-menu-links-highlight-div">
                            <a data-i18n="nav.about_me" href="./index.html#about_me"></a>
                            <div class="overlay-nav-menu-links-highlight" ></div>
                        </div>
                        <div class="overlay-nav-menu-links-highlight-div">
                            <a data-i18n="nav.skills" href="./index.html#skills"></a>
                            <div class="overlay-nav-menu-links-highlight" ></div>
                        </div>
                        <div class="overlay-nav-menu-links-highlight-div">
                            <a href="./index.html#portfolio">Portfolio</a>
                            <div class="overlay-nav-menu-links-highlight" ></div>
                        </div>
                        <div class="overlay-nav-menu-links-highlight-div">
                            <a data-i18n="nav.contact" href="./index.html#contact_section">Portfolio</a>
                            <div class="overlay-nav-menu-links-highlight" ></div>
                        </div>
                    </div>
                    <div class="overlay-nav-btns">
                        <button id="language_ln_de_mobile">DE</button>
                        <p>/</p>
                        <button id="language_ln_en_mobile" class="active">EN</button>
                    </div>
                </nav>
            </section>
        </div>
    </section>
    <main class="document-main">
        <nav class="main-nav">
            <a id="nav_to_Landing_section" href="./index.html#landing_section"><img src="./assets/img/david.png" alt="my Name"></a>
            <section class="main-nav-menu">
                <div class="main-nav-menu-links">
                    <div class="main-nav-menu-links-highlight-div">
                        <a data-i18n="nav.about_me" href="./index.html#about_me"></a>
                        <div class="main-nav-menu-links-highlight" ></div>
                    </div>
                    <div class="main-nav-menu-links-highlight-div">
                        <a data-i18n="nav.skills" href="./index.html#skills"></a>
                        <div class="main-nav-menu-links-highlight" ></div>
                    </div>
                    <div class="main-nav-menu-links-highlight-div">
                        <a href="./index.html#portfolio">Portfolio</a>
                        <div class="main-nav-menu-links-highlight" ></div>
                    </div>
                </div>
                <div class="main-nav-btns">
                    <button id="language_ln_de">DE</button>
                    <button id="language_ln_en" class="active">EN</button>
                </div>
            </section>
            <button id="open_overlay" class="main-nav-burger-menu-btn">
                <svg width="32" height="30" viewBox="0 0 32 30" fill="none">
                    <path d="M1 1H31" stroke="white" stroke-width="2" stroke-linecap="round" />
                    <path d="M1 15H31" stroke="white" stroke-width="2" stroke-linecap="round" />
                    <path d="M1 29H31" stroke="white" stroke-width="2" stroke-linecap="round" />
                </svg>
            </button>
        </nav>
        <section class="privacy-policy-headline">
            <div class="privacy-policy-headline-container">
                <div class="privacy-policy-headline-highlight-left"></div>
                <h1 data-i18n="priPol.headline" class="privacy-policy-headline-h1"></h1>
                <div class="privacy-policy-headline-highlight-right"></div>
            </div>
        </section>
    </main>

    <script src="./scripts/translations.js"></script>
    <script src="./scripts/privacy_policy.js"></script>
    <script src="./script.js"></script>
</body>
</html>
